<template>
    <lightning-card>
        <div class="slds-text-heading_medium">{pkmnName} Moves:</div> 
        <div class="moves-container">
            <template for:each={displayedMoves} for:item="move">
                <div key={move.Id} class={move.moveCardClass}>
                    <label class="move-card-label">
                        
                        <input
                        type="radio"
                        value={move.Id}
                        name="moveRadioGroup"
                        onchange={handleSelection}
                        checked={move.isChecked}
                        class="slds-assistive-text"
                        />

                        <div class="move-card-content">
                            <div class="move-card-header">
                                <span>{move.Move__c}</span>
                                <span class="move-card-type-pill">{move.Type__c}</span>
                            </div>
                            
                            <!-- <div class="move-card-footer">
                                
                            </div> -->

                        </div>

                    </label>
                </div>
            </template>
        </div>
    </lightning-card>
    
</template>
